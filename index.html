<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0d0a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, serif;
    overflow: hidden;
    position: relative;
  }
  canvas#stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 3rem 2.5rem;
    max-width: 520px;
  }
  .seven {
    font-size: 7rem;
    font-weight: 700;
    color: #c084fc;
    line-height: 1;
    text-shadow: 0 0 60px #a855f766;
    animation: pulse 3s ease-in-out infinite;
  }
  .years-label {
    font-size: 1rem;
    letter-spacing: 0.35em;
    color: #a78bfa;
    text-transform: uppercase;
    margin-top: 0.3rem;
    margin-bottom: 2.5rem;
  }
  .message {
    font-size: 1.45rem;
    color: #ede9fe;
    line-height: 1.7;
    font-style: italic;
  }
  .message em {
    color: #c084fc;
    font-style: normal;
    font-weight: 600;
  }
  .footer {
    margin-top: 2.5rem;
    font-size: 0.85rem;
    color: #7c3aed88;
    letter-spacing: 0.15em;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.85; transform: scale(1.04); }
  }
  .heart-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  /* CUENTA ATRÁS */
  .countdown-label {
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    color: #a78bfa99;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    margin-top: 2rem;
  }
  .countdown {
    display: flex;
    justify-content: center;
    gap: 1.2rem;
    margin-top: 0.25rem;
  }
  .cd-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 52px;
  }
  .cd-number {
    font-size: 2rem;
    font-weight: 700;
    color: #e879f9;
    line-height: 1;
    font-family: Georgia, serif;
  }
  .cd-unit {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: #a78bfa66;
    text-transform: uppercase;
    margin-top: 0.2rem;
  }
  .cd-sep {
    font-size: 1.8rem;
    color: #7c3aed55;
    line-height: 1;
    margin-top: 0.1rem;
    align-self: flex-start;
    padding-top: 0.1rem;
  }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<canvas class="heart-canvas" id="hearts"></canvas>

<!-- Pues esto es basicamente el texto que se muestra. Editando esto, se cambia lo que se ve -->
<div class="container">
  <div class="seven">7</div>
  <div class="years-label">años juntos</div>
  <div class="message">
    Felices 7 años, <em>June</em>.<br>
    Como un sabio dijo,<br>
    no son suficientes.
  </div>

  <div class="countdown-label">próximo aniversario en</div>
  <div class="countdown">
    <div class="cd-block">
      <span class="cd-number" id="cd-days">--</span>
      <span class="cd-unit">días</span>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-block">
      <span class="cd-number" id="cd-hours">--</span>
      <span class="cd-unit">horas</span>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-block">
      <span class="cd-number" id="cd-mins">--</span>
      <span class="cd-unit">min</span>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-block">
      <span class="cd-number" id="cd-secs">--</span>
      <span class="cd-unit">seg</span>
    </div>
  </div>

  <div class="footer">18 · 04 · 2019</div>
</div>

<script>
const starCanvas = document.getElementById('stars');
const sc = starCanvas.getContext('2d');
const hCanvas = document.getElementById('hearts');
const hc = hCanvas.getContext('2d');

function resize() {
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
  hCanvas.width = window.innerWidth;
  hCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const stars = [];
for (let i = 0; i < 160; i++) {
  stars.push({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.2 + 0.2,
    a: Math.random(),
    speed: Math.random() * 0.008 + 0.003
  });
}
function drawStars() {
  sc.clearRect(0, 0, starCanvas.width, starCanvas.height);
  for (const s of stars) {
    s.a += s.speed;
    const alpha = (Math.sin(s.a) + 1) / 2 * 0.8 + 0.1;
    sc.beginPath();
    sc.arc(s.x * starCanvas.width, s.y * starCanvas.height, s.r, 0, Math.PI * 2);
    sc.fillStyle = `rgba(192, 132, 252, ${alpha})`;
    sc.fill();
  }
}

class Heart {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * hCanvas.width;
    this.y = init ? Math.random() * hCanvas.height : hCanvas.height + 30;
    this.size = Math.random() * 14 + 7;
    this.speedY = Math.random() * 0.6 + 0.25;
    this.speedX = (Math.random() - 0.5) * 0.4;
    this.alpha = Math.random() * 0.5 + 0.3;
    this.rot = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.015;
  }
  draw() {
    hc.save();
    hc.translate(this.x, this.y);
    hc.rotate(this.rot);
    hc.globalAlpha = this.alpha;
    const s = this.size;
    hc.beginPath();
    hc.moveTo(0, s * 0.25);
    hc.bezierCurveTo(-s * 0.5, -s * 0.2, -s, s * 0.1, 0, s);
    hc.bezierCurveTo(s, s * 0.1, s * 0.5, -s * 0.2, 0, s * 0.25);
    const grad = hc.createRadialGradient(0, s * 0.4, 0, 0, s * 0.4, s);
    grad.addColorStop(0, '#e879f9');
    grad.addColorStop(1, '#7c3aed');
    hc.fillStyle = grad;
    hc.fill();
    hc.restore();
  }
  update() {
    this.y -= this.speedY;
    this.x += this.speedX;
    this.rot += this.rotSpeed;
    if (this.y < -30) this.reset(false);
  }
}

const hearts = [];
for (let i = 0; i < 28; i++) hearts.push(new Heart());

/* CUENTA ATRÁS — apunta al próximo 18 de abril */
function updateCountdown() {
  const now = new Date();
  const year = now.getFullYear();
  let target = new Date(year, 3, 18, 0, 0, 0); // mes 3 = abril (0-indexado)
  if (now >= target) target = new Date(year + 1, 3, 18, 0, 0, 0);
  const diff = target - now;
  const days  = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins  = Math.floor((diff % 3600000) / 60000);
  const secs  = Math.floor((diff % 60000) / 1000);
  document.getElementById('cd-days').textContent  = String(days).padStart(3, '0');
  document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
  document.getElementById('cd-mins').textContent  = String(mins).padStart(2, '0');
  document.getElementById('cd-secs').textContent  = String(secs).padStart(2, '0');
}
updateCountdown();
setInterval(updateCountdown, 1000);

function loop() {
  hc.clearRect(0, 0, hCanvas.width, hCanvas.height);
  for (const h of hearts) { h.update(); h.draw(); }
  drawStars();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
